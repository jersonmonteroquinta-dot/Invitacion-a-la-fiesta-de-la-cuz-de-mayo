<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libro de Imágenes</title>

<style>
body {
    margin: 0;
    background: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

.book {
    width: 90vw;
    max-width: 800px;
    height: 500px;
    position: relative;
    perspective: 2000px;
}

.page {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: left;
    transition: transform 1s;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    border-radius: 10px;
}

.page img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* IMPORTANTE: no recorta la imagen */
}

.page.flipped {
    transform: rotateY(-180deg);
}

.controls {
    position: absolute;
    bottom: -60px;
    width: 100%;
    display: flex;
    justify-content: space-between;
}

button {
    padding: 18px 35px;
    front-size: 18;
    border: none;
    background: #ff6b6b;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #ff4b4b;
}
</style>
</head>

<body>

<div class="book" id="book">
    <div class="page"><img src="img1.jpg"></div>
    <div class="page"><img src="img2.jpg"></div>
    <div class="page"><img src="img3.jpg"></div>
    <div class="page"><img src="img4.jpg"></div>
    <div class="page"><img src="img5.jpg"></div>
    <div class="page"><img src="img6.jpg"></div>
</div>

<div class="controls">
    <button onclick="prevPage()">⬅ Anterior</button>
    <button onclick="nextPage()">Siguiente ➡</button>
</div>

<script>
const pages = document.querySelectorAll('.page');
let current = 0;

pages.forEach((page, index) => {
    page.style.zIndex = pages.length - index;
});

function nextPage() {
    if (current < pages.length) {
        pages[current].classList.add('flipped');
        current++;
    }
}

function prevPage() {
    if (current > 0) {
        current--;
        pages[current].classList.remove('flipped');
    }
}
</script>

</body>
</html>
